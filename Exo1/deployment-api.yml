apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ecommerce-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: API_INTERNAL_PORT
              value: "3000"